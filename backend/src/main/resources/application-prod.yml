spring:
  datasource:
    # Render exposes host/port/database/user/password individually; assemble JDBC URL here.
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    # Don't gate /actuator/health on mail server reachability —
    # we don't dispatch mail in this demo, so an unreachable SMTP host
    # would fail Render's health check and the deploy never goes live.
    mail:
      enabled: false
